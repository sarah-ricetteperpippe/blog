[build]
  # Rimuoviamo il lockfile prima di npm install per aggirare il bug npm con le
  # optional deps di piattaforma (Rollup, esbuild). Su Linux il fresh install
  # registra correttamente i binari linux-x64-gnu nel nuovo lockfile.
  command = "rm -f package-lock.json && npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/"
  to = "/it/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
