[build]
  # Rimuoviamo il lockfile prima di npm install per aggirare il bug npm con le
  # optional deps di piattaforma (Rollup, esbuild). Su Linux il fresh install
  # registra correttamente i binari linux-x64-gnu nel nuovo lockfile.
  command = "rm -rf node_modules package-lock.json && npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/"
  to = "/it/"
  status = 302
  conditions = {Language = ["it"]}

[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302
  conditions = {Language = ["fr"]}

[[redirects]]
  from = "/"
  to = "/it/"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
