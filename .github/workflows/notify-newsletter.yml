name: Notify newsletter on new content

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'
      - 'src/content/academy/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fetch-depth 2 to compare HEAD~1)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run notify script
        env:
          # SITE_URL come repo variable (Settings → Variables → Actions).
          # Fallback su ricetteperpippe.com se la variable non è impostata.
          SITE_URL: ${{ vars.SITE_URL || 'https://ricetteperpippe.com' }}
          # N8N_SEND_RECIPE_WEBHOOK come repo secret (Settings → Secrets → Actions).
          # Production URL del webhook n8n "Send recipe flow" (senza -test).
          N8N_SEND_RECIPE_WEBHOOK: ${{ secrets.N8N_SEND_RECIPE_WEBHOOK }}
        run: node scripts/notify-newsletter.mjs
