name: Notify newsletter on new content

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'
      - 'src/content/academy/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fetch-depth 2 to compare HEAD~1)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run notify script
        env:
          N8N_PUBLISH_WEBHOOK: ${{ secrets.N8N_PUBLISH_WEBHOOK }}
          SITE_URL: 'https://ricetteperpippe.com'
        run: node scripts/notify-newsletter.mjs
