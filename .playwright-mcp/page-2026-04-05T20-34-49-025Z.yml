                        - list [ref=e355]:
                          - listitem [level=1] [ref=e356]:
                            - paragraph [ref=e357]:
                              - generic [ref=e358]:
                                - strong [ref=e359]: Pulisci i funghi delicatamente con carta asciutta.
                                - text: Non lavarli MAI sotto acqua. Se il gambo è lungo, taglialo a filo cappello. Se i funghi sono molto spessi, puoi pressarli leggermente tra due fogli di carta forno prima del forno per appiattirli, oppure schiacciandoli con delicatezza con un batticarne (o un bicchiere!).
                          - listitem [level=1] [ref=e360]:
                            - paragraph [ref=e361]:
                              - generic [ref=e362]:
                                - strong [ref=e363]: Incidi leggermente la superficie dei cardoncelli a griglia.
                                - text: Tagli superficiali, non profondi.
                                - emphasis [ref=e364]: "(Con i pleurotus non incidere: sono più sottili e si rompono.)"
                          - listitem [level=1] [ref=e365]:
                            - paragraph [ref=e366]:
                              - generic [ref=e367]:
                                - strong [ref=e368]: Sala leggermente entrambi i lati.
                                - text: Lasciali riposare 10 minuti su carta forno. Tampona l’umidità che esce.
                                - emphasis [ref=e369]: (Con i pleurotus bastano 5–8 minuti.)
                          - listitem [level=1] [ref=e370]:
                            - paragraph [ref=e371]:
                              - strong [ref=e373]: Spennella con 1 cucchiaio di olio.
                          - listitem [level=1] [ref=e374]:
                            - paragraph [ref=e375]:
                              - generic [ref=e376]:
                                - strong [ref=e377]: Inforna in una teglia con carta forno a 180°C ventilato per 10–15 minuti.
                                - text: Devono ammorbidirsi senza colorire troppo. Se sono molto spessi puoi arrivare a 15 minuti.
                                - emphasis [ref=e378]: "(Con i pleurotus: 170°C per 8–10 minuti. Se sottili, 6–7 minuti.)"
                          - listitem [level=1] [ref=e379]:
                            - paragraph [ref=e380]:
                              - generic [ref=e381]:
                                - strong [ref=e382]: Scalda una padella pesante a fuoco medio-alto.
                                - text: Deve essere calda prima di aggiungere i funghi.
                          - listitem [level=1] [ref=e383]:
                            - paragraph [ref=e384]:
                              - generic [ref=e385]:
                                - strong [ref=e386]: Metti 1 cucchiaio di olio in padella a fuoco medio-alto e quando caldo aggiungi i funghi.
                                - text: Appoggiali e non muoverli per 3–4 minuti. Monitora il fuoco, se troppo forte abbassalo. Se vuoi effetto più compatto, premili leggermente con la spatola.
                                - emphasis [ref=e387]: (Con i pleurotus rosola 2–3 minuti per lato e non pressare forte.)
                          - listitem [level=1] [ref=e388]:
                            - paragraph [ref=e389]:
                              - generic [ref=e390]:
                                - strong [ref=e391]: Gira e rosola l’altro lato per lo stesso tempo.
                                - text: Devono fare crosta scura.
                          - listitem [level=1] [ref=e392]:
                            - paragraph [ref=e393]:
                              - generic [ref=e394]:
                                - strong [ref=e395]: (Opzionale) Abbassa leggermente il fuoco e versa la salsa di soia nella parte libera della padella.
                                - text: Lasciala ridurre 20–30 secondi a contatto con il metallo. Fai scivolare i funghi sopra la soia addensata per laccarli.
                          - listitem [level=1] [ref=e396]:
                            - paragraph [ref=e397]:
                              - generic [ref=e398]:
                                - strong [ref=e399]: Aggiungi burro, aglio e rosmarino negli ultimi 1–2 minuti.
                                - text: Inclina la padella e irrora i funghi con il grasso caldo.
                          - listitem [level=1] [ref=e400]:
                            - paragraph [ref=e401]:
                              - generic [ref=e402]:
