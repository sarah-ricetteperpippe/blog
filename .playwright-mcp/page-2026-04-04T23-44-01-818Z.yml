                          - listitem [level=1] [ref=e376]:
                            - paragraph [ref=e377]:
                              - generic [ref=e378]: Con un cucchiaio estrai la cipolla dalla padella, scolandola alla meglio dall’olio, e aggiungila alle uova insieme alla menta. Mescola bene.
